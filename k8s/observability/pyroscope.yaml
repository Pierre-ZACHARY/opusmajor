apiVersion: apps/v1
kind: Deployment
metadata:
  name: pyroscope
  namespace: observability
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pyroscope
  template:
    metadata:
      labels:
        app: pyroscope
    spec:
      containers:
        - name: pyroscope
          image: grafana/pyroscope:1.12.0
          imagePullPolicy: IfNotPresent
          args:
            - server
            - --config.file=/etc/pyroscope/config.yaml
          ports:
            - name: http
              containerPort: 4040
          volumeMounts:
            - name: config
              mountPath: /etc/pyroscope
      volumes:
        - name: config
          configMap:
            name: pyroscope-config
---
apiVersion: v1
kind: Service
metadata:
  name: pyroscope
  namespace: observability
spec:
  selector:
    app: pyroscope
  ports:
    - name: http
      port: 4040
      targetPort: http
  type: ClusterIP

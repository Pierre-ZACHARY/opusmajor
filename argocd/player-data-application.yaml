apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: player-data
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Pierre-ZACHARY/opusmajor.git
    targetRevision: main
    path: k8s/player-data
  destination:
    server: https://kubernetes.default.svc
    namespace: player-data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
